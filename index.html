<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Conference ticket generator</title>
  <link rel="stylesheet" href="./assets/styles/normalize.css">
  <link rel="stylesheet" href="./assets/styles/style.min.css">
</head>
<body>
  <header class="header">
    <div class="header__icon">
      <img src="./assets/images/logo-mark.svg" alt="logo-mark">
    </div>
    <p class="header__text">
      Coding Conf
    </p>
  </header>
  <main class="main">
    <h1 id="mainTitel" class="main__titel">
      Your Journey to Coding Conf </br> 2025 Starts Here!
    </h1>
    <p id="mainSubtitel" class="main__subtitel">
      Secure your spot at next year's biggest coding conference.
    </p>
    <form id="ticketForm" class="main__ticketForm">
      <div class="ticketForm__upload-container">

      </div>
      <div class="form__group ticketForm__name">
        <label for="full-name" class="form__group__label">
          Full Name
        </label>
        <input
          class="form__group__input"
          type= "text"
          id= "full-name"
          name= "full-name"
        >
        <div class="form__group__error ticketForm__name__error">
          <span class="form__group__error__icon"></span>
          <p class="form__group__error__text"></p>
        </div>
      </div>
      <div class="form__group ticketForm__email">
        <label for="email-input" class="form__group__label">
          Email Address
        </label>
        <input
          class="form__group__input"
          type= "email"
          id= "email-input"
          name= "email-address"
          placeholder="example@email.com"
        >
        <div class="form__group__error ticketForm__email__error">
          <span class="form__group__error__icon"></span>
          <p class="form__group__error__text"></p>
        </div>
      </div>
      <div class="form__group ticketForm__github">
        <label for="github-input" class="form__group__label">
          GitHub Username
        </label>
        <input
          class="form__group__input"
          type= "text"
          id= "github-input"
          name= "github"
          placeholder="@yourusername"
        >
        <div class="form__group__error ticketForm__github__error">
          <span class="form__group__error__icon"></span>
          <p class="form__group__error__text"></p>
        </div>
      </div>
      <button type="submit" class="ticketForm__btn">
        Generate My Ticket
      </button>
    </form>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/Artem12122/Conference-ticket-generator">Artem Lavrenko</a>.
  </footer>
</body>
</html>
